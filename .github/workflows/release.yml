name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release-APK's bouwen en publiceren
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java installeren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Flutter installeren
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Dependencies ophalen
        run: flutter pub get

      - name: Analyzer
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Universele release-APK bouwen
        run: flutter build apk --release

      - name: APK hernoemen met versienummer
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/taalleer-${GITHUB_REF_NAME}-universal.apk"
          ls -la dist/

      - name: GitHub Release aanmaken met APK
        uses: softprops/action-gh-release@v2
        with:
          files: dist/taalleer-${{ github.ref_name }}-universal.apk
          generate_release_notes: true
