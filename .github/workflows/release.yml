name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release-APK's bouwen en publiceren
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java installeren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Flutter installeren
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Dependencies ophalen
        run: flutter pub get

      - name: Analyzer
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Release-APK bouwen (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Universele release-APK bouwen
        run: flutter build apk --release

      - name: APK's hernoemen met versienummer
        run: |
          mkdir -p dist
          for f in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(basename "$f" | sed 's/app-\(.*\)-release.apk/\1/')
            cp "$f" "dist/taalleer-${GITHUB_REF_NAME}-${abi}.apk"
          done
          cp build/app/outputs/flutter-apk/app-release.apk "dist/taalleer-${GITHUB_REF_NAME}-universal.apk"
          ls -la dist/

      - name: GitHub Release aanmaken met APK's
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
